appId: com.aegisexam.mahasiswa
productName: AegisExam Mahasiswa
asar: false
directories:
  output: dist/mahasiswa
files:
  - .env
  - electron.js
  - preload.js
  - electron-server.php
  - electron.mahasiswa.js
  - php.ini
  - php/**/*
  - package.json
  - app/**/*
  - bootstrap/**/*
  - config/**/*
  - database/**/*
  - JALANKAN.txt
  - public/**/*
  - resources/**/*
  - routes/**/*
  - storage/**/*
  - vendor/**/*
  - node_modules/localtunnel/**/*
extraMetadata:
  main: electron.mahasiswa.js
win:
  icon: public/aegis_logo.png
  signAndEditExecutable: false
  target:
    - dir
